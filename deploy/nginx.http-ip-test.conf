# Public-IP HTTP ingress for quick smoke tests (port 80).
# For production, use deploy/nginx.conf.example with TLS on 443.

upstream control_plane {
    server 127.0.0.1:5000;
}

upstream tunnel_plane {
    server 127.0.0.1:8443;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://control_plane;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz-control {
        proxy_pass http://control_plane/healthz;
    }

    location /healthz-tunnel {
        proxy_pass http://tunnel_plane/healthz;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /tunnel {
        proxy_pass http://tunnel_plane/tunnel;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
    }
}
