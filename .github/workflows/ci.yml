name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-checks:
    name: Python syntax & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Syntax check (compile all sources)
        run: python -m compileall -q server client scripts

      - name: Lint with Ruff
        run: ruff check .
